# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Python package

on:
  push:
    branches:
      - main
      - develop
      - release-*
  pull_request:
    branches: ["*"]
  release:
    types:
      - published

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  UV_NO_DEV: 1

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      commit-message: ${{ steps.get-commit-message.outputs.commit-message }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }} # gets correct commit message
      - name: Show commit
        run: git show -s
      - name: Output commit message
        id: get-commit-message
        run: |
          {
            echo 'commit-message<<CI_EOF'
            git show -s --format="%B"
            echo CI_EOF
          } >> "$GITHUB_OUTPUT"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          ref: ${{ github.event.pull_request.head.sha }} # gets correct commit message
      - name: Install uv and set the Python version
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.10"
          enable-cache: true
      - name: Lint with ruff
        run: |
          uv run --group ci ruff check --select I .
          uv run --group ci ruff format --check .
      - name: Type check with Pyright
        run: uv run --group ci pyright
      - name: Build sdist
        run: uv build --sdist --out-dir dist
      - uses: actions/upload-artifact@v7
        with:
          name: wheels
          path: dist

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
        python-version: ["3.8", "3.14"]
        exclude:
          # Latest macos runner does not support older Python versions
          # https://github.com/actions/setup-python/issues/852
          - os: macos-latest
            python-version: "3.8"
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - name: Install uv and set the Python version
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Downgrade numpy
        if: ${{ matrix.python-version == '3.8' }}
        run: |
          # test with older numpy version to ensure compatibility
          uv add numpy~=1.17.5
      - name: Test with pytest
        run: uv run --group ci pytest -v --benchmark-disable -n auto

  # NOTE: build step only runs on tag builds or when the commit message contains
  # "[ci test build]" for testing
  build:
    needs: [meta, lint, test]
    if: "${{ startsWith(github.ref, 'refs/tags/') || contains(needs.meta.outputs.commit-message, '[ci test build]') }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - windows-latest
          - windows-11-arm
          - macos-latest
          - macos-15-intel # Intel builds
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_ARCHS_MACOS: ${{ runner.arch == 'ARM64' && 'auto universal2' || 'auto' }}
        with:
          output-dir: dist
          build-frontend: "build[uv]"
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ runner.os }}-${{ runner.arch }}
          path: dist

  # NOTE: release step only runs on tag builds
  release:
    name: Release
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: [build]
    environment:
      name: PyPI
      url: "https://pypi.org/p/cryosparc-tools"
      deployment: ${{ startsWith(github.ref, 'refs/tags/') }}
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: dist
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
